{% extends 'tracker/base.html' %}

{% block title %}Report Item{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3><i class="fas fa-plus"></i> Report Lost or Found Item</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="employee_id" class="form-label"><i class="fas fa-id-card"></i> Employee ID</label>
                        <input type="text" class="form-control" id="employee_id" name="employee_id" required placeholder="Enter your Employee ID">
                    </div>
                    <div class="mb-3">
                        <label for="item_name" class="form-label"><i class="fas fa-tag"></i> Item Name</label>
                        <input type="text" class="form-control" id="item_name" name="item_name" required placeholder="e.g., Wallet, Keys">
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label"><i class="fas fa-align-left"></i> Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3" required placeholder="Describe the item in detail"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="item_type" class="form-label"><i class="fas fa-question"></i> Type</label>
                        <select class="form-select" id="item_type" name="item_type" required>
                            <option value="lost">Lost</option>
                            <option value="found">Found</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label"><i class="fas fa-map-marker-alt"></i> Location</label>
                        <input type="text" class="form-control" id="location" name="location" required placeholder="Where was it lost/found?">
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label"><i class="fas fa-calendar"></i> Date</label>
                        <input type="date" class="form-control" id="date" name="date" required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Report Item</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
