{% extends 'tracker/base.html' %}

{% block title %}Add Employee{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h3><i class="fas fa-user-plus"></i> Add Employee</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="employee_id" class="form-label"><i class="fas fa-id-card"></i> Employee ID</label>
                        <input type="text" class="form-control" id="employee_id" name="employee_id" required placeholder="Unique Employee ID">
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label"><i class="fas fa-user"></i> Name</label>
                        <input type="text" class="form-control" id="name" name="name" required placeholder="Full Name">
                    </div>
                    <div class="mb-3">
                        <label for="department" class="form-label"><i class="fas fa-building"></i> Department</label>
                        <input type="text" class="form-control" id="department" name="department" placeholder="e.g., IT, HR">
                    </div>
                    <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Add Employee</button>
                    <a href="{% url 'employees' %}" class="btn btn-secondary ms-2"><i class="fas fa-arrow-left"></i> Back</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
